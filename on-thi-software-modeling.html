<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ôn thi — Software Modeling &amp; Design (Gomaa)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F3F5F8;
  --card:#FFFFFF;
  --ink:#131C2B;
  --ink-soft:#5A6577;
  --line:#C9D2DE;
  --accent:#2749C9;
  --accent-dark:#1E3AA8;
  --accent-bg:#E9EDFB;
  --ok:#157F4C;
  --ok-bg:#E4F3EB;
  --bad:#C2372F;
  --bad-bg:#F9E9E7;
  --radius:10px;
  --mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  --body:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  --display:'Space Grotesk','Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{
  font-family:var(--body);
  color:var(--ink);
  background-color:var(--paper);
  background-image:
    linear-gradient(rgba(39,73,201,.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(39,73,201,.045) 1px, transparent 1px);
  background-size:28px 28px;
  min-height:100vh;
  padding:32px 16px 64px;
  line-height:1.5;
}
.wrap{max-width:720px;margin:0 auto}

/* ---------- Header ---------- */
.eyebrow{
  font-family:var(--mono);font-size:.72rem;letter-spacing:.14em;
  color:var(--ink-soft);text-transform:uppercase;margin-bottom:8px;
}
h1{
  font-family:var(--display);font-weight:700;font-size:1.9rem;
  letter-spacing:-.01em;line-height:1.15;margin-bottom:4px;
}
.sub{color:var(--ink-soft);font-size:.95rem;margin-bottom:22px}

.controls{
  display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:26px;
}
.chsel{
  font-family:var(--body);font-size:.88rem;font-weight:500;color:var(--ink);
  padding:9px 12px;border-radius:var(--radius);border:1px solid var(--line);
  background:var(--card);cursor:pointer;max-width:100%;
}
.chsel:hover{border-color:var(--ink)}
.chsel:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.seg{
  display:inline-flex;border:1px solid var(--line);border-radius:var(--radius);
  overflow:hidden;background:var(--card);
}
.seg button{
  font-family:var(--body);font-size:.88rem;font-weight:500;
  padding:8px 16px;border:none;background:transparent;color:var(--ink-soft);
  cursor:pointer;
}
.seg button.active{background:var(--ink);color:#fff}
.seg button:not(.active):hover{color:var(--ink)}

.toggle{
  display:inline-flex;align-items:center;gap:8px;cursor:pointer;
  font-size:.88rem;color:var(--ink-soft);user-select:none;
}
.toggle input{position:absolute;opacity:0;width:0;height:0}
.toggle .tk{
  width:34px;height:20px;border-radius:20px;background:var(--line);
  position:relative;transition:background .15s;flex:none;
}
.toggle .tk::after{
  content:"";position:absolute;top:3px;left:3px;width:14px;height:14px;
  border-radius:50%;background:#fff;transition:transform .15s;
}
.toggle input:checked + .tk{background:var(--accent)}
.toggle input:checked + .tk::after{transform:translateX(14px)}
.toggle input:focus-visible + .tk{outline:2px solid var(--accent);outline-offset:2px}

.btn{
  font-family:var(--body);font-size:.88rem;font-weight:600;
  padding:9px 18px;border-radius:var(--radius);cursor:pointer;
  border:1px solid var(--line);background:var(--card);color:var(--ink);
}
.btn:hover{border-color:var(--ink)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:var(--accent-dark);border-color:var(--accent-dark)}
.btn.warn{background:var(--bad);border-color:var(--bad);color:#fff}
.btn:focus-visible,.seg button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.push{margin-left:auto}

/* ---------- Rail: state-diagram progress ---------- */
.rail{
  display:flex;align-items:center;gap:0;margin:0 0 26px;padding:0 2px 6px;
  overflow-x:auto;
}
.rail .pseudo{flex:none}
.rail .init{width:10px;height:10px;border-radius:50%;background:var(--ink)}
.rail .final{
  width:14px;height:14px;border-radius:50%;border:2px solid var(--ink);
  position:relative;flex:none;
}
.rail .final::after{
  content:"";position:absolute;inset:2px;border-radius:50%;background:var(--ink);
}
.rail .edge{flex:1;height:2px;background:var(--line);min-width:6px}
.node{
  flex:none;width:30px;height:30px;border-radius:50%;
  border:2px solid var(--line);background:var(--card);
  font-family:var(--mono);font-size:.7rem;font-weight:500;color:var(--ink-soft);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:transform .1s;
}
.rail.dense .node{width:24px;height:24px;font-size:.6rem}
.rail.dense .edge{min-width:3px}
.node:hover{transform:scale(1.12)}
.node:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.node.current{border-color:var(--accent);color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
.node.picked{border-color:var(--ink);background:var(--ink);color:#fff}
.node.ok{border-color:var(--ok);background:var(--ok);color:#fff}
.node.bad{border-color:var(--bad);background:var(--bad);color:#fff}

/* ---------- Question card ---------- */
.card{
  background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:26px 26px 22px;box-shadow:0 1px 3px rgba(19,28,43,.05);
}
.qmeta{
  font-family:var(--mono);font-size:.75rem;color:var(--ink-soft);
  margin-bottom:10px;letter-spacing:.06em;
}
.qtext{
  font-family:var(--display);font-weight:500;font-size:1.22rem;
  line-height:1.35;margin-bottom:18px;
}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{
  display:flex;gap:12px;align-items:flex-start;text-align:left;
  width:100%;padding:12px 14px;border-radius:var(--radius);
  border:1.5px solid var(--line);background:var(--card);
  font-family:var(--body);font-size:.97rem;color:var(--ink);
  cursor:pointer;line-height:1.45;transition:border-color .12s,background .12s;
}
.opt:hover:not(:disabled){border-color:var(--accent)}
.opt:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.opt .tag{
  font-family:var(--mono);font-size:.8rem;font-weight:500;flex:none;
  width:26px;height:26px;border-radius:6px;border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;margin-top:1px;
  color:var(--ink-soft);
}
.opt.sel{border-color:var(--accent);background:var(--accent-bg)}
.opt.sel .tag{border-color:var(--accent);background:var(--accent);color:#fff}
.opt.ok{border-color:var(--ok);background:var(--ok-bg)}
.opt.ok .tag{border-color:var(--ok);background:var(--ok);color:#fff}
.opt.bad{border-color:var(--bad);background:var(--bad-bg)}
.opt.bad .tag{border-color:var(--bad);background:var(--bad);color:#fff}
.opt.dim{opacity:.55}
.opt:disabled{cursor:default}

.feedback{
  margin-top:16px;padding:10px 14px;border-radius:var(--radius);
  font-size:.9rem;font-weight:500;display:none;
}
.feedback.ok{display:block;background:var(--ok-bg);color:var(--ok)}
.feedback.bad{display:block;background:var(--bad-bg);color:var(--bad)}

.nav{
  display:flex;gap:10px;align-items:center;margin-top:20px;
}
.hint{
  font-family:var(--mono);font-size:.72rem;color:var(--ink-soft);
  margin-top:18px;text-align:center;
}

/* ---------- Results ---------- */
.results{display:none}
.results.show{display:block}
.score-line{
  display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:6px;
}
.score-big{font-family:var(--display);font-weight:700;font-size:2.6rem;letter-spacing:-.02em}
.score-note{color:var(--ink-soft);font-size:.95rem}
.rlist{margin-top:18px;display:flex;flex-direction:column;gap:8px}
.ritem{
  display:flex;gap:12px;align-items:baseline;padding:10px 14px;
  border-radius:var(--radius);border:1px solid var(--line);
  background:var(--card);cursor:pointer;font-size:.92rem;text-align:left;
  width:100%;color:var(--ink);font-family:var(--body);
}
.ritem:hover{border-color:var(--ink)}
.ritem .st{font-family:var(--mono);font-size:.78rem;font-weight:500;flex:none;width:64px}
.ritem.ok .st{color:var(--ok)}
.ritem.bad .st{color:var(--bad)}
.ractions{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}

@media (max-width:520px){
  h1{font-size:1.5rem}
  .card{padding:20px 16px}
  .node{width:24px;height:24px;font-size:.62rem}
  .rail.dense .node{width:21px;height:21px;font-size:.55rem}
  .score-big{font-size:2.1rem}
}
@media (prefers-reduced-motion:reduce){
  *{transition:none!important}
}
</style>
</head>

</div>

const LETTERS = ["a","b","c","d"];

// ---------- State ----------
let mode = "practice";      // 'practice' | 'test'
let QUESTIONS = [];         // bộ câu hỏi đang hoạt động (theo chương đã chọn)
let order = [];             // thứ tự câu hỏi (index vào QUESTIONS)
let optOrders = [];         // optOrders[pos] = mảng index đáp án hiển thị
let answers = [];           // answers[pos] = index hiển thị đã chọn, hoặc null
let locked = [];            // practice: đã chốt đáp án chưa
let submitted = false;      // test: đã nộp chưa
let cur = 0;
let confirmSubmit = false;

function shuffleArr(a){
  a = a.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function initChapterSelect(){
  const sel = document.getElementById("chapterSel");
  CHAPTERS.forEach((c,i)=>{
    const o = document.createElement("option");
    o.value = String(i); o.textContent = c.name;
    sel.appendChild(o);
  });
  const total = CHAPTERS.reduce((s,c)=>s+c.questions.length,0);
  const o = document.createElement("option");
  o.value = "all"; o.textContent = "Tất cả các chương ("+total+" câu)";
  sel.appendChild(o);
}

function loadChapter(){
  const v = document.getElementById("chapterSel").value || "0";
  if(v==="all"){
    QUESTIONS = [];
    CHAPTERS.forEach(c=>c.questions.forEach(q=>QUESTIONS.push({q:q.q,opts:q.opts,correct:q.correct,ch:c.short})));
    document.getElementById("sub").textContent =
      "Tổng hợp Chương 1–"+CHAPTERS.length+" · "+QUESTIONS.length+" câu trắc nghiệm";
  } else {
    const c = CHAPTERS[parseInt(v)];
    QUESTIONS = c.questions.map(q=>({q:q.q,opts:q.opts,correct:q.correct,ch:null}));
    document.getElementById("sub").textContent = c.name+" · "+QUESTIONS.length+" câu trắc nghiệm";
  }
}

function buildSession(qIndices){
  const shuf = document.getElementById("shuffleChk").checked;
  order = shuf ? shuffleArr(qIndices) : qIndices.slice();
  optOrders = order.map(()=> shuf ? shuffleArr([0,1,2,3]) : [0,1,2,3]);
  answers = order.map(()=>null);
  locked  = order.map(()=>false);
  submitted = false;
  confirmSubmit = false;
  cur = 0;
  showQuestionView();
  renderAll();
}

function restart(){
  loadChapter();
  buildSession(QUESTIONS.map((_,i)=>i));
}
function retryWrong(){
  const wrong = [];
  order.forEach((qi,pos)=>{
    const dispCorrect = optOrders[pos].indexOf(QUESTIONS[qi].correct);
    if(answers[pos] !== dispCorrect) wrong.push(qi);
  });
  if(wrong.length===0){ restart(); return; }
  buildSession(wrong);
}

function setMode(m){
  mode = m;
  document.getElementById("modePractice").classList.toggle("active", m==="practice");
  document.getElementById("modeTest").classList.toggle("active", m==="test");
  restart();
}

// ---------- Render ----------
function isDone(pos){
  return mode==="practice" ? locked[pos] : submitted;
}
function isCorrect(pos){
  const qi = order[pos];
  const dispCorrect = optOrders[pos].indexOf(QUESTIONS[qi].correct);
  return answers[pos] === dispCorrect;
}
function resultsShown(){
  return document.getElementById("rcard").classList.contains("show");
}

function renderRail(){
  const rail = document.getElementById("rail");
  rail.innerHTML = "";
  rail.classList.toggle("dense", order.length>12);
  const init = document.createElement("div");
  init.className = "pseudo init"; init.title = "initial state";
  rail.appendChild(init);
  order.forEach((qi,pos)=>{
    const e = document.createElement("div"); e.className = "edge"; rail.appendChild(e);
    const n = document.createElement("button");
    n.className = "node"; n.textContent = pos+1; n.type = "button";
    n.setAttribute("aria-label","Câu "+(pos+1));
    if(pos===cur && !resultsShown()) n.classList.add("current");
    if(isDone(pos)){
      n.classList.add(isCorrect(pos) ? "ok" : "bad");
    } else if(answers[pos]!==null){
      n.classList.add("picked");
    }
    n.onclick = ()=>{ showQuestionView(); cur = pos; renderAll(); };
    rail.appendChild(n);
  });
  const e = document.createElement("div"); e.className = "edge"; rail.appendChild(e);
  const fin = document.createElement("div");
  fin.className = "pseudo final"; fin.title = "final state";
  rail.appendChild(fin);
}

function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;"); }

function renderQuestion(){
  const pos = cur, qi = order[pos], Q = QUESTIONS[qi];
  const done = isDone(pos);
  const dispCorrect = optOrders[pos].indexOf(Q.correct);

  document.getElementById("qmeta").textContent =
    "Câu " + (pos+1) + " / " + order.length +
    (Q.ch ? "  ·  "+Q.ch : "") +
    (mode==="test" && !submitted ? "  ·  chế độ kiểm tra" : "");
  document.getElementById("qtext").textContent = Q.q;

  const box = document.getElementById("opts");
  box.innerHTML = "";
  optOrders[pos].forEach((origIdx, dispIdx)=>{
    const b = document.createElement("button");
    b.className = "opt"; b.type = "button";
    b.innerHTML = '<span class="tag">'+LETTERS[dispIdx]+'</span><span>'+esc(Q.opts[origIdx])+'</span>';
    if(done){
      b.disabled = true;
      if(dispIdx===dispCorrect) b.classList.add("ok");
      else if(dispIdx===answers[pos]) b.classList.add("bad");
      else b.classList.add("dim");
    } else {
      if(dispIdx===answers[pos]) b.classList.add("sel");
      b.onclick = ()=>pick(dispIdx);
    }
    box.appendChild(b);
  });

  const fb = document.getElementById("feedback");
  fb.className = "feedback";
  if(done && answers[pos]!==null){
    if(isCorrect(pos)){
      fb.classList.add("ok"); fb.textContent = "Chính xác — đáp án ("+LETTERS[dispCorrect]+").";
    } else {
      fb.classList.add("bad");
      fb.textContent = "Sai. Bạn chọn ("+LETTERS[answers[pos]]+"), đáp án đúng là ("+LETTERS[dispCorrect]+").";
    }
  } else if(done && answers[pos]===null){
    fb.classList.add("bad"); fb.textContent = "Chưa trả lời. Đáp án đúng là ("+LETTERS[dispCorrect]+").";
  }

  document.getElementById("prevBtn").disabled = (pos===0);
  const nextBtn = document.getElementById("nextBtn");
  nextBtn.textContent = (pos===order.length-1 && (mode==="practice"||submitted)) ? "Kết quả →" : "Sau →";
  const sb = document.getElementById("submitBtn");
  if(mode==="test" && !submitted){
    sb.style.display = "";
    const un = answers.filter(a=>a===null).length;
    sb.textContent = confirmSubmit ? ("Vẫn nộp ("+un+" câu trống)") : "Nộp bài";
  } else {
    sb.style.display = "none";
  }
}

function renderAll(){ renderRail(); if(!resultsShown()) renderQuestion(); }

// ---------- Actions ----------
function pick(dispIdx){
  if(isDone(cur)) return;
  answers[cur] = dispIdx;
  confirmSubmit = false;
  if(mode==="practice") locked[cur] = true;
  renderAll();
}

function go(step){
  if(step===1 && cur===order.length-1){
    if(mode==="practice" || submitted){ showResults(); return; }
  }
  cur = Math.min(order.length-1, Math.max(0, cur+step));
  renderAll();
}

function trySubmit(){
  const un = answers.filter(a=>a===null).length;
  if(un>0 && !confirmSubmit){
    confirmSubmit = true; renderQuestion(); return;
  }
  submitted = true; confirmSubmit = false;
  showResults();
}

function showQuestionView(){
  document.getElementById("rcard").classList.remove("show");
  document.getElementById("qcard").style.display = "";
}
function reviewFrom(pos){ showQuestionView(); cur = pos; renderAll(); }

function showResults(){
  if(mode==="practice" && locked.some(l=>!l)){
    cur = locked.indexOf(false); renderAll(); return;
  }
  let n = 0;
  order.forEach((_,pos)=>{ if(isCorrect(pos)) n++; });
  document.getElementById("scoreBig").textContent = n + " / " + order.length;
  document.getElementById("scoreNote").textContent =
    "đúng " + Math.round(n/order.length*100) + "% · " +
    (mode==="test" ? "chế độ kiểm tra" : "chế độ luyện tập");
  const list = document.getElementById("rlist");
  list.innerHTML = "";
  order.forEach((qi,pos)=>{
    const ok = isCorrect(pos);
    const Q = QUESTIONS[qi];
    const b = document.createElement("button");
    b.className = "ritem " + (ok?"ok":"bad"); b.type = "button";
    b.innerHTML = '<span class="st">'+(ok?"ĐÚNG":"SAI")+'</span><span>Câu '+(pos+1)+
      (Q.ch ? " ("+Q.ch+")" : "")+': '+esc(Q.q)+'</span>';
    b.onclick = ()=>reviewFrom(pos);
    list.appendChild(b);
  });
  document.getElementById("retryWrong").style.display =
    order.every((_,pos)=>isCorrect(pos)) ? "none" : "";
  document.getElementById("qcard").style.display = "none";
  document.getElementById("rcard").classList.add("show");
  renderRail();
}

// ---------- Keyboard ----------
document.addEventListener("keydown", (e)=>{
  if(resultsShown()) return;
  const k = e.key.toLowerCase();
  if(["1","2","3","4"].includes(k)) pick(parseInt(k)-1);
  else if(["a","b","c","d"].includes(k)) pick(LETTERS.indexOf(k));
  else if(e.key==="ArrowRight" || e.key==="Enter") go(1);
  else if(e.key==="ArrowLeft") go(-1);
});

initChapterSelect();
restart();
</script>
